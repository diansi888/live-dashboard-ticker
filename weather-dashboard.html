<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Weather Dashboard</title>\n    <style>\n        body { background-color: #1a1a1a; color: white; font-family: Arial, sans-serif; }\n        .container { padding: 20px; max-width: 800px; margin: auto; }\n        .search { margin-bottom: 20px; }\n        .weather-card { background-color: #2a2a2a; padding: 15px; border-radius: 8px; }\n        .temp-toggle { cursor: pointer; }\n        .hidden { display: none; }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>Weather Dashboard</h1>\n        <div class="search">\n            <input type="text" id="cityInput" placeholder="Enter city name" />\n            <button id="searchButton">Search</button>\n            <button class="temp-toggle" onclick="toggleTempUnit()">°C / °F</button>\n        </div>\n        <div id="currentWeather" class="weather-card hidden"></div>\n        <div id="sevenDayForecast" class="weather-card hidden"></div>\n        <div id="weatherAlerts" class="weather-card hidden"></div>\n    </div>\n    <script>\n        const tempUnits = { celsius: 'metric', fahrenheit: 'imperial' };\n        let currentUnit = tempUnits.celsius;\n\n        async function fetchWeather(city) {\n            const weatherResponse = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current_weather=true&daily=temperature_2m_min,temperature_2m_max&timezone=Asia/Tokyo`);\n            const weatherData = await weatherResponse.json();\n            // Populate the current weather and forecast data here\n            displayCurrentWeather(weatherData);\n        }\n\n        function displayCurrentWeather(data) {\n            const currentWeatherDiv = document.getElementById('currentWeather');\n            currentWeatherDiv.classList.remove('hidden');\n            currentWeatherDiv.innerHTML = `<h2>Current Weather in Tokyo</h2>\n            <p>Temperature: ${data.current_weather.temperature}°C</p>`;\n        }\n\n        document.getElementById('searchButton').addEventListener('click', () => {\n            const city = document.getElementById('cityInput').value;\n            fetchWeather(city);\n        });\n\n        function toggleTempUnit() {\n            currentUnit = (currentUnit === tempUnits.celsius) ? tempUnits.fahrenheit : tempUnits.celsius;\n            // Add functionality to update temperature display\n        }\n    </script>\n</body>\n</html>
