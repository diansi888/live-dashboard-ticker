<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satelite Map Overlay</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #map { height: 100vh; }
    </style>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.3.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.3.0/mapbox-gl.css" rel="stylesheet" />
</head>
<body>
    <div id="map"></div>
    <script>
        mapboxgl.accessToken = 'YOUR_MAPBOX_ACCESS_TOKEN'; // Replace with your Mapbox token
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/streets-v11',
            center: [0, 20], // Starting position [lng, lat]
            zoom: 2
        });

        // Example Data Layer: Global Corridor Friction
        const frictionDataLayer = {
            type: 'fill',
            source: 'YOUR_DATA_SOURCE',
            paint: {
                'fill-color': 'rgba(255, 0, 0, 0.5)',
                'fill-opacity': 0.5
            }
        };

        // Add Example Layer
        map.on('load', () => {
            map.addLayer(frictionDataLayer);
            // Add more layers for port congestion, shipping routes, etc.
        });
    </script>
</body>
</html>
